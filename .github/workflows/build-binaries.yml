name: Build Autoclicker Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies and show environment
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -V
          python -c "import sys; print('executable:', sys.executable)"
          pip --version
          pip install --no-cache-dir pyautogui pynput pymsgbox pyscreeze pygetwindow mouseinfo pyperclip pyinstaller==5.11
          pip list
      - name: Build with PyInstaller (Windows GUI)
        run: |
          python -m PyInstaller --clean --log-level=DEBUG --noconfirm --onefile --add-data "targets;targets" --hidden-import tkinter --name autoclicker autoclick_gui.py
          echo "dist contents:"
          dir dist\* || true
      - name: Prepare artifact
        shell: powershell
        run: |
          New-Item -ItemType Directory artifact -Force | Out-Null
          Copy-Item -Path dist\autoclicker.exe -Destination artifact\autoclicker-windows.exe -Force
          if (Test-Path targets) { Copy-Item -Path targets -Destination artifact\targets -Recurse -Force }
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-windows
          path: artifact

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies and show environment
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -V
          python3 -c "import sys; print('executable:', sys.executable)"
          pip --version || true
          # Install runtime deps but avoid opencv to reduce packaging complexity
          pip install --no-cache-dir pyautogui pynput pymsgbox pyscreeze pygetwindow mouseinfo pyperclip pyinstaller==5.11
          pip list || true
      - name: Build with PyInstaller (macOS - headless script)
        run: |
          # Building the GUI on macOS runners can fail due to missing Tk; build the headless script instead
          python3 -m PyInstaller --clean --log-level=DEBUG --noconfirm --onefile --add-data "targets:targets" --name autoclicker autoclick_image.py
          echo "dist contents:"
          ls -la dist || true
      - name: Prepare artifact
        run: |
          mkdir -p artifact
          cp dist/autoclicker artifact/autoclicker-macos
          if [ -d targets ]; then cp -R targets artifact/targets; fi
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autoclicker-macos
          path: artifact
